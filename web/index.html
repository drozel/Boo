<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <title>Boo · Resource Calendar</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='26' font-size='26'%3E%F0%9F%91%BB%3C/text%3E%3C/svg%3E" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <svg width="0" height="0" style="position:absolute" aria-hidden="true">
      <defs>
        <symbol id="i-chevron-left" viewBox="0 0 24 24"><path d="M15 6l-6 6 6 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></symbol>
        <symbol id="i-chevron-right" viewBox="0 0 24 24"><path d="M9 6l6 6-6 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></symbol>
        <symbol id="i-plus" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></symbol>
        <symbol id="i-trash" viewBox="0 0 24 24"><path d="M4 7h16M10 11v6M14 11v6M6 7l1 12a2 2 0 002 2h6a2 2 0 002-2l1-12M9 7V4h6v3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></symbol>
        <symbol id="i-pencil" viewBox="0 0 24 24"><path d="M4 20h4L20 8l-4-4L4 16v4z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></symbol>
        <symbol id="i-user" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4" fill="none" stroke="currentColor" stroke-width="2"/><path d="M4 21c1.5-4 5-6 8-6s6.5 2 8 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></symbol>
        <symbol id="i-today" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2" fill="none" stroke="currentColor" stroke-width="2"/><path d="M3 10h18M8 3v4M16 3v4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></symbol>
        <symbol id="i-flask" viewBox="0 0 24 24"><path d="M9 3h6M10 3v6l-5 9a2 2 0 001.7 3h10.6a2 2 0 001.7-3l-5-9V3" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></symbol>
        <symbol id="i-server" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="7" rx="1.5" fill="none" stroke="currentColor" stroke-width="2"/><rect x="3" y="13" width="18" height="7" rx="1.5" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="7" cy="7.5" r="1" fill="currentColor"/><circle cx="7" cy="16.5" r="1" fill="currentColor"/></symbol>
        <symbol id="i-cpu" viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="1.5" fill="none" stroke="currentColor" stroke-width="2"/><rect x="9" y="9" width="6" height="6" fill="none" stroke="currentColor" stroke-width="2"/><path d="M3 10h3M3 14h3M18 10h3M18 14h3M10 3v3M14 3v3M10 18v3M14 18v3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></symbol>
        <symbol id="i-wifi" viewBox="0 0 24 24"><path d="M2 9a15 15 0 0120 0M5.5 12.5a10 10 0 0113 0M8.5 16a5 5 0 017 0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="19.5" r="1.2" fill="currentColor"/></symbol>
        <symbol id="i-rocket" viewBox="0 0 24 24"><path d="M14 4c4 0 6 2 6 6-3 0-4 2-6 4s-4 3-4 6c-4 0-6-2-6-6 3 0 4-2 6-4s2-4 4-6zM15 9a1.5 1.5 0 110 3 1.5 1.5 0 010-3z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></symbol>
        <symbol id="i-phone" viewBox="0 0 24 24"><rect x="7" y="3" width="10" height="18" rx="2" fill="none" stroke="currentColor" stroke-width="2"/><path d="M11 18h2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></symbol>
        <symbol id="i-car" viewBox="0 0 24 24"><path d="M4 14l2-6h12l2 6v5H4v-5z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><circle cx="8" cy="18" r="1.6" fill="currentColor"/><circle cx="16" cy="18" r="1.6" fill="currentColor"/></symbol>
        <symbol id="i-camera" viewBox="0 0 24 24"><path d="M4 8h4l1.5-2h5L16 8h4v11H4z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><circle cx="12" cy="13" r="3.5" fill="none" stroke="currentColor" stroke-width="2"/></symbol>
        <symbol id="i-bolt" viewBox="0 0 24 24"><path d="M13 3L5 14h6l-1 7 8-11h-6l1-7z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></symbol>
      </defs>
    </svg>

    <header class="topbar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">👻</span>
        <span class="brand-name">Boo</span>
        <span class="brand-tag">resource calendar</span>
      </div>
      <div class="nav">
        <button id="prev" class="icon-btn" aria-label="Previous week"><svg class="icon"><use href="#i-chevron-left"/></svg></button>
        <button id="today" class="chip-btn"><svg class="icon"><use href="#i-today"/></svg><span>Today</span></button>
        <button id="next" class="icon-btn" aria-label="Next week"><svg class="icon"><use href="#i-chevron-right"/></svg></button>
        <span id="range-label" class="range-label"></span>
      </div>
      <div class="who">
        <button id="who-btn" class="who-chip" title="Change name">
          <svg class="icon"><use href="#i-user"/></svg>
          <span id="who-name">…</span>
          <svg class="icon icon-sm"><use href="#i-pencil"/></svg>
        </button>
      </div>
    </header>

    <main class="app">
      <aside class="sidebar">
        <div class="sidebar-head">
          <h2>Resources</h2>
          <button id="add-resource" class="icon-btn ghost" aria-label="Add resource"><svg class="icon"><use href="#i-plus"/></svg></button>
        </div>
        <ul id="resource-list" class="resource-list"></ul>
      </aside>

      <section class="timeline-wrap">
        <div id="timeline" class="timeline" role="grid" aria-label="Resource availability">
          <div class="timeline-header" id="timeline-header"></div>
          <div class="timeline-body" id="timeline-body"></div>
        </div>
        <div id="empty" class="empty hidden">
          <div class="empty-glyph" aria-hidden="true">👻</div>
          <h3>No resources yet</h3>
          <p>Add a test system, rig, or anything your team shares.</p>
          <button class="chip-btn primary" id="empty-add"><svg class="icon"><use href="#i-plus"/></svg><span>Add resource</span></button>
        </div>
      </section>
    </main>

    <button id="fab" class="fab" aria-label="New booking"><svg class="icon"><use href="#i-plus"/></svg></button>

    <!-- Name dialog -->
    <dialog id="name-dialog" class="dialog">
      <form method="dialog" class="dialog-body">
        <h3>Who's booking?</h3>
        <p class="muted">Your name is stored only in this browser.</p>
        <label class="field">
          <span>Name</span>
          <input id="name-input" required maxlength="40" autocomplete="name" placeholder="e.g. Alice" />
        </label>
        <div class="dialog-actions">
          <button value="save" class="chip-btn primary">Save</button>
        </div>
      </form>
    </dialog>

    <!-- Resource dialog -->
    <dialog id="resource-dialog" class="dialog">
      <form id="resource-form" class="dialog-body">
        <h3 id="resource-dialog-title">New resource</h3>
        <label class="field">
          <span>Name</span>
          <input name="name" required maxlength="60" placeholder="Test Rig Alpha" />
        </label>
        <label class="field">
          <span>Description (optional)</span>
          <input name="description" maxlength="200" placeholder="What is it used for?" />
        </label>
        <div class="field">
          <span>Color</span>
          <div class="swatches" id="color-swatches"></div>
        </div>
        <div class="field">
          <span>Icon</span>
          <div class="icon-picker" id="icon-picker"></div>
        </div>
        <div class="dialog-actions">
          <button type="button" class="chip-btn danger" id="resource-delete" hidden><svg class="icon"><use href="#i-trash"/></svg><span>Delete</span></button>
          <span class="spacer"></span>
          <button type="button" class="chip-btn ghost" data-close>Cancel</button>
          <button type="submit" class="chip-btn primary">Save</button>
        </div>
      </form>
    </dialog>

    <!-- Booking dialog -->
    <dialog id="booking-dialog" class="dialog">
      <form id="booking-form" class="dialog-body">
        <h3 id="booking-dialog-title">New booking</h3>
        <div id="booking-resource-badge" class="resource-badge"></div>
        <label class="field">
          <span>Booked by</span>
          <input name="user" required maxlength="40" />
        </label>
        <label class="field">
          <span>Co-bookers <em class="muted">optional</em></span>
          <div class="chip-input" id="cobooker-input">
            <ul class="chips" id="cobooker-chips"></ul>
            <input id="cobooker-entry" placeholder="Add a name, press Enter" maxlength="40" />
          </div>
        </label>
        <div class="field-row">
          <label class="field">
            <span>Start</span>
            <input name="start" type="datetime-local" required />
          </label>
          <label class="field">
            <span>End</span>
            <input name="end" type="datetime-local" required />
          </label>
        </div>
        <label class="field">
          <span>Note (optional)</span>
          <input name="note" maxlength="200" placeholder="What's this booking for?" />
        </label>
        <p id="booking-error" class="form-error" hidden></p>
        <div class="dialog-actions">
          <button type="button" class="chip-btn danger" id="booking-delete" hidden><svg class="icon"><use href="#i-trash"/></svg><span>Delete</span></button>
          <span class="spacer"></span>
          <button type="button" class="chip-btn ghost" data-close>Cancel</button>
          <button type="submit" class="chip-btn primary">Save</button>
        </div>
      </form>
    </dialog>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="/app.js" type="module"></script>
  </body>
</html>
